<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered traffic monitoring — vehicle counting, classification and ANPR from live camera feeds." />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Traffic Lens Africa</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect to Supabase for faster auth -->
    <link rel="preconnect" href="https://ohmnyeflfszqbxuytvhm.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://ohmnyeflfszqbxuytvhm.supabase.co" />

    <!-- Inline critical CSS — prevents flash of unstyled content -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0A0A0A; color: #fff; }
      #root { min-height: 100vh; }
      /* Loading spinner shown before React hydrates */
      #app-loader {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: #0A0A0A; z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader.hidden { opacity: 0; pointer-events: none; }
      .loader-ring {
        width: 36px; height: 36px; border-radius: 50%;
        border: 2px solid rgba(212,255,51,0.15);
        border-top-color: #D4FF33;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loading indicator — hidden once React mounts -->
    <div id="app-loader">
      <div class="loader-ring"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hide loader once app is ready -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('app-loader');
            if (loader) loader.classList.add('hidden');
            setTimeout(function() { if (loader) loader.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
      });
    </script>
  </body>
</html>
